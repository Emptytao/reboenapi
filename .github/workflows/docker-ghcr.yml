name: Build Docker image (GHCR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest-${{ matrix.arch }}
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest manifest
        run: |
          docker buildx imagetools create \
            -t ${{ steps.image.outputs.name }}:latest \
            ${{ steps.image.outputs.name }}:latest-amd64 \
            ${{ steps.image.outputs.name }}:latest-arm64

      - name: Create commit manifest
        run: |
          docker buildx imagetools create \
            -t ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }} \
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}-amd64 \
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}-arm64
